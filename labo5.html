<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Re: LABO5</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 128 128%22><rect width=%22128%22 height=%22128%22 rx=%2226%22 fill=%22%23131a2b%22/><text x=%2230%22 y=%2292%22 font-size=%2280%22 font-family=%22monospace%22 fill=%22%237c3aed%22>L</text></svg>">
  <style>
:root {
  /* Balanced, accessible LABO5 theme */
  --bg: #131a2b;
  --bg-elev: #18203a;
  --bg-card: #1c2545;
  --text: #eef2fb;
  --text-dim: #b7c0d9;
  --brand: #7c3aed; /* violet */
  --brand-2: #06b6d4; /* cyan */
  --border: #2a355a;
  --chip: #141c35;
  --shadow: 0 6px 18px rgba(13, 26, 43, 0.45);
  --glow: 0 0 22px rgba(124, 58, 237, 0.28);
  --appbar-h: 64px;
}

* {
  box-sizing: border-box;
}

html, body {
  height: 100%;
}

body {
  margin: 0;
  background:
    radial-gradient(900px 420px at 15% -10%, rgba(124,58,237,0.08), transparent),
    radial-gradient(800px 340px at 100% 0%, rgba(6,182,212,0.08), transparent),
    var(--bg);
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans JP", Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* App bar (hidden on watch page) */
.appbar {
  position: sticky;
  top: 0;
  z-index: 1000;
  height: var(--appbar-h);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 16px;
  background: rgba(24, 32, 58, 0.86);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.appbar.hidden { display: none !important; }

.logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-weight: 900;
  color: var(--text);
  text-decoration: none;
  letter-spacing: 0.3px;
}
.logo-badge {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--brand), var(--brand-2));
  display: grid;
  place-items: center;
  color: #fff;
  font-weight: 900;
  box-shadow: var(--glow);
}
.spacer { flex: 1; }

/* Search bars (global, hero, and watch-local) */
.searchbar, .watch-searchbar, .hero-search {
  display: flex;
  align-items: center;
  gap: 8px;
  width: min(760px, 92vw);
}
.search-input-wrap, .watch-search-input-wrap, .hero-input-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  padding: 12px 16px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  border-radius: 999px 0 0 999px;
  box-shadow: inset 0 0 0 1px rgba(124,58,237,0.16);
}
.search-input, .watch-search-input, .hero-input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 16px;
}
.search-btn, .watch-search-btn, .hero-btn {
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  padding: 12px 18px;
  border-radius: 0 999px 999px 0;
  font-weight: 700;
  cursor: pointer;
  transition: 120ms ease;
  box-shadow: var(--shadow);
}
.hero-btn {
  background: linear-gradient(90deg, var(--brand), var(--brand-2));
  border: none;
  color: #fff;
  box-shadow: var(--glow);
}
.search-btn:hover, .watch-search-btn:hover { background: #223060; }
.hero-btn:hover { filter: brightness(1.06); }

/* Page visibility */
.page { display: none !important; }
.page.active {
  display: block !important;
  animation: fadeIn 220ms ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(2px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Home: exact center (x,y) for title + search, no awkward bottom space */
.home {
  min-height: calc(100vh - var(--appbar-h));
  position: relative;
  padding: 0;
}
.home-inner {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: min(860px, 100%);
  display: grid;
  grid-auto-rows: max-content;
  gap: 18px;
  justify-items: center;
  text-align: center;
}
.hero-title {
  margin: 0;
  font-size: clamp(52px, 10vw, 96px);
  font-weight: 900;
  letter-spacing: 0.6px;
  line-height: 1.04;
  background: linear-gradient(90deg, var(--brand), var(--brand-2));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 2px 0 rgba(0,0,0,0.2);
}
.hero-sub {
  margin: 0;
  color: var(--text-dim);
  font-size: clamp(15px, 2.4vw, 18px);
  letter-spacing: 0.2px;
}
.hero-search { margin-top: 8px; }

/* Search page */
.search-page {
  padding: 20px 16px 12px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  max-width: 1160px;
  margin: 0 auto;
}
.search-header {
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
}
.search-query-chip {
  background: var(--chip);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 14px;
  box-shadow: inset 0 0 0 1px rgba(6,182,212,0.16);
}
.status {
  display: none;
  align-items: center;
  gap: 8px;
  color: var(--text-dim);
  font-size: 13px;
}
.status.show { display: flex; }
.spinner {
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--brand-2);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.results {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
}
.result-card {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 12px;
  padding: 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: 120ms ease;
}
.result-card:hover {
  background: #223060;
  transform: translateY(-1px);
}
.thumb {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 12px;
  background: #0f1835;
  object-fit: cover;
}
.res-meta {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.res-title {
  font-size: 18px;
  font-weight: 800;
  line-height: 1.3;
}
.res-channel { color: var(--text-dim); font-size: 14px; }
.res-snippet { color: var(--text-dim); font-size: 14px; }

/* Pager / infinite scroll */
.pager {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 12px 0 24px;
}
.pager-btn {
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  padding: 10px 16px;
  border-radius: 999px;
  cursor: pointer;
  box-shadow: var(--shadow);
}
.pager-btn:disabled { opacity: 0.5; cursor: default; }
.pager-btn:hover:not(:disabled) { background: #223060; }

/* Watch page */
.watch-page { padding: 0; }

.watch-searchbar-wrap {
  position: sticky;
  top: 0;
  z-index: 900;
  background: rgba(24, 32, 58, 0.86);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  backdrop-filter: blur(8px);
}
.watch-searchbar {
  width: 100%;
  max-width: 1160px;
  margin: 0 auto;
}

/* Two-column container that ALWAYS keeps sidebar on the right by scaling video column */
.watch-container {
  max-width: 1160px;
  margin: 0 auto;
  padding: 16px;
  display: grid;
  grid-template-columns: minmax(520px, 1fr) 360px; /* video | sidebar */
  gap: 20px;
  align-items: start;
}

/* Maintain two columns down to small widths by progressively shrinking both columns */
@media (max-width: 1024px) {
  .watch-container {
    grid-template-columns: minmax(480px, 1fr) 340px; /* iPad landscape */
    gap: 18px;
  }
}
@media (max-width: 900px) {
  .watch-container {
    grid-template-columns: minmax(440px, 1fr) 320px; /* iPad portrait / small tablets */
    gap: 16px;
  }
}
@media (max-width: 780px) {
  .watch-container {
    grid-template-columns: minmax(400px, 1fr) 300px; /* large phones in landscape */
    gap: 14px;
  }
}
@media (max-width: 700px) {
  .watch-container {
    grid-template-columns: minmax(360px, 1fr) 280px; /* phones portrait keep side-by-side by shrinking video */
    gap: 12px;
  }
}
@media (max-width: 620px) {
  .watch-container {
    grid-template-columns: minmax(320px, 1fr) 260px;
    gap: 10px;
  }
}
@media (max-width: 560px) {
  .watch-container {
    grid-template-columns: minmax(280px, 1fr) 240px;
    gap: 10px;
  }
}
@media (max-width: 500px) {
  .watch-container {
    grid-template-columns: minmax(240px, 1fr) 220px; /* ultra small but still side-by-side */
    gap: 8px;
  }
}

/* Player card and video */
.player-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.player-wrap {
  background: #000;
  aspect-ratio: 16/9;
  display: grid;
  place-items: center;
}
video {
  width: 100%;
  height: 100%;
  background: #000;
}

.video-meta {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.video-title {
  font-weight: 900;
  font-size: clamp(18px, 2.6vw, 22px);
  letter-spacing: 0.2px;
}
.video-sub {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-dim);
  font-size: 14px;
  flex-wrap: wrap;
}
.chip {
  background: var(--chip);
  border: 1px solid var(--border);
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
}

/* Sidebar (related videos) */
.sidebar {
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: sticky;
  top: 86px;
  max-height: calc(100vh - 86px);
  overflow: auto;
  padding-bottom: 24px;
}
.rec-section-title {
  font-weight: 800;
  margin: 6px 0 4px;
  letter-spacing: 0.2px;
}
.rec-card {
  display: grid;
  grid-template-columns: 168px 1fr;
  gap: 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 8px;
  cursor: pointer;
  transition: 120ms ease;
  box-shadow: var(--shadow);
}
.rec-card:hover {
  transform: translateY(-1px);
  background: #223060;
}
.rec-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 10px;
  object-fit: cover;
}
.rec-title {
  font-size: 14px;
  font-weight: 800;
  line-height: 1.35;
}
.rec-channel {
  font-size: 12px;
  color: var(--text-dim);
}

/* Comments */
.comments-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px;
  margin-top: 14px;
  box-shadow: var(--shadow);
}
.comments-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.comment {
  display: grid;
  grid-template-columns: 44px 1fr;
  gap: 10px;
  padding: 10px 0;
  border-top: 1px solid var(--border);
}
.comment:first-child { border-top: none; }
.avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  object-fit: cover;
  background: #121a35;
}
.comment-meta {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.comment-author {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 800;
  font-size: 14px;
}
.author-badge {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 999px;
  border: 1px solid var(--border);
  color: var(--text-dim);
}
.comment-content {
  font-size: 14px;
  color: var(--text);
}
.comment-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-dim);
  font-size: 12px;
}

/* Hide Google CSE default UI */
.gcse-searchresults-only,
.gsc-control-cse,
.gsc-webResult,
.gcsc-find-more-on-google,
.gsc-results,
.gsc-cursor {
  display: none !important;
  visibility: hidden !important;
  position: absolute !important;
  left: -9999px !important;
  top: -9999px !important;
  width: 1px !important;
  height: 1px !important;
  overflow: hidden !important;
  opacity: 0 !important;
  pointer-events: none !important;
}

.muted { color: var(--text-dim); }

/* Back button */
.back-btn {
  position: fixed;
  left: 16px;
  bottom: 16px;
  z-index: 1100;
  display: none;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 999px;
  cursor: pointer;
  box-shadow: var(--shadow);
}
.back-btn.show {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
  </style>

<body>
  <header class="appbar" id="appbar">
    <a href="#/" class="logo" id="nav-home">
      <div class="logo-badge">L</div>
      <div>Re: LABO5</div>
    </a>
    <div class="spacer"></div>
    <form class="searchbar" id="nav-search-form">
      <div class="search-input-wrap">
        <input id="nav-search-input" class="search-input" type="text" placeholder="検索" aria-label="検索" />
      </div>
      <button class="search-btn" type="submit">検索</button>
    </form>
  </header>

  <main id="app">
    <!-- Home (exact center) -->
    <section id="page-home" class="page home active" hidden>
      <div class="home-inner">
        <h1 class="hero-title">Re: LABO5</h1>
        <p class="hero-sub">LABO5 was made with HTML5 Fastest video downloads in your browser.</p>
        <form class="hero-search" id="hero-search-form">
          <div class="hero-input-wrap">
            <input id="hero-search-input" class="hero-input" type="text" placeholder="Search videos" aria-label="検索" />
          </div>
          <button class="hero-btn" type="submit">検索</button>
        </form>
      </div>
    </section>

    <!-- Search -->
    <section id="page-search" class="page search-page" hidden>
      <div class="search-header">
        <span class="search-query-chip" id="search-chip"></span>
        <div class="status" id="search-status">
          <div class="spinner"></div>
          <span>検索結果を読み込み中…</span>
        </div>
      </div>

      <div class="results" id="results"></div>

      <div class="pager" id="pager">
        <button id="next-page-btn" class="pager-btn" disabled>次のページ</button>
      </div>
    </section>

    <!-- Watch -->
    <section id="page-watch" class="page watch-page" hidden>
      <div class="watch-searchbar-wrap">
        <form class="watch-searchbar" id="watch-search-form">
          <div class="watch-search-input-wrap">
            <input id="watch-search-input" class="watch-search-input" type="text" placeholder="Search videos" aria-label="検索" />
          </div>
          <button class="watch-search-btn" type="submit">検索</button>
        </form>
      </div>

      <div class="watch-container">
        <div class="watch-left">
          <div class="player-card">
            <div class="player-wrap">
              <video id="player" controls playsinline></video>
            </div>
            <div class="video-meta">
              <div class="video-title" id="video-title"></div>
              <div class="video-sub">
                <span id="video-duration" class="chip" style="display:none;"></span>
                <span class="chip">360p ストリーム</span>
                <span id="video-source" class="chip" style="display:none;"></span>
                <span id="video-status" class="muted" style="display:none;"></span>
              </div>

          <div class="comments-card">
            <div class="comments-header">

        <aside class="watch-right">

            </div>
            <div id="recs-list"></div>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <button class="back-btn" id="back-btn">⟵ 検索に戻る</button>
  <div id="hidden-cse" class="gcse-searchresults-only"></div>

  <script>
    // 状態管理
    let pagination = { hasCursor: false, currentIndex: 0, totalPages: 1, loadingNext: false };
    let cseHiddenElem = null;

    // ユーティリティ関数
    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, tag => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[tag] || tag));
    }
    function youTubeThumb(id) {
      return `https://i.ytimg.com/vi/${id}/mqdefault.jpg`;
    }
    function getVideoIdFromUrl(url) {
      const match = url.match(/(?:v=|v\/|embed\/|youtu\.be\/)([^&?#]+)/);
      return match ? match[1] : null;
    }
    function setStatus(id, show) {
      const el = document.getElementById(id);
      if (el) {
        if (show) el.classList.add('show');
        else el.classList.remove('show');
      }
    }

    // 画面切り替え
    function showView(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'instant' });
    }
    function navigateTo(hash) {
      window.location.hash = hash;
    }

    // ルーティング
    function handleRoute() {
      const hash = window.location.hash;
      if (hash.startsWith('#/watch')) {
        const params = new URLSearchParams(hash.split('?')[1]);
        const v = params.get('v');
        if (v) {
          showView('view-watch');
          loadWatch(v);
        } else {
          navigateTo('#/');
        }
      } else if (hash.startsWith('#/results')) {
        const params = new URLSearchParams(hash.split('?')[1]);
        const q = params.get('q');
        if (q) {
          showView('view-results');
          executeSearch(q);
        } else {
          navigateTo('#/');
        }
      } else {
        showView('view-home');
      }
    }

    // Google Custom Search (CSE) の初期化
    function initCSE() {
      try {
        if (window.google && google.search && google.search.cse && google.search.cse.element) {
          if (!document.querySelector('.gsc-control-cse')) {
            google.search.cse.element.render({ div: "hidden-cse", tag: 'searchresults-only', attributes: { linkTarget: '_self' } });
          }
          cseHiddenElem = google.search.cse.element.getElement('hidden-cse') || google.search.cse.element.getElement('searchresults-only0');
        } else {
          setTimeout(initCSE, 200);
        }
      } catch (e) {
        console.warn("CSE Init Error", e);
      }
    }

    // 検索の実行
    function executeSearch(query) {
      document.getElementById('search-chip').textContent = query;
      document.getElementById('nav-search-input').value = query;
      setStatus('search-status', true);
      document.getElementById('results').innerHTML = '';
      sessionStorage.setItem('lastQuery', query);
      pagination = { hasCursor: false, currentIndex: 0, totalPages: 1, loadingNext: false };
      document.getElementById('next-page-btn').disabled = true;

      const attemptExecute = () => {
        try {
          const elem = cseHiddenElem || (window.google && google.search && google.search.cse && google.search.cse.element && (google.search.cse.element.getElement('hidden-cse') || google.search.cse.element.getElement('searchresults-only0')));
          if (elem) {
            const container = document.getElementById('hidden-cse');
            if (container) {
              const resContainer = container.querySelector('.gsc-results');
              if (resContainer) resContainer.innerHTML = '';
            }
            elem.execute(`site:youtube.com ${query}`);
            waitForSearchResults(0);
          } else {
            setTimeout(attemptExecute, 200);
          }
        } catch (e) {
          setTimeout(attemptExecute, 200);
        }
      };
      attemptExecute();
    }

    // 検索結果が反映されるまで待機
    function waitForSearchResults(attempts) {
      if (attempts > 50) {
        setStatus('search-status', false);
        document.getElementById('results').innerHTML = '<div class="muted">検索結果の取得にタイムアウトしました。再度お試しください。</div>';
        return;
      }
      const container = document.getElementById('hidden-cse');
      if (!container) return setTimeout(() => waitForSearchResults(attempts + 1), 200);

      const rawResults = container.querySelectorAll('.gsc-webResult.gsc-result');
      const noResultsText = container.innerText || "";

      if (rawResults && rawResults.length > 0) {
        renderSearchResultsFromCSE();
        setupPaginationState();
      } else if (noResultsText.includes('一致する') || noResultsText.includes('見つかりません') || noResultsText.includes('No results')) {
        setStatus('search-status', false);
        document.getElementById('results').innerHTML = '<div class="muted">検索結果が見つかりませんでした。</div>';
      } else {
        setTimeout(() => waitForSearchResults(attempts + 1), 200);
      }
    }

    // 検索結果を画面に描画
    function renderSearchResultsFromCSE(append = false) {
      const container = document.getElementById('hidden-cse');
      if (!container) return;
      const rawResults = container.querySelectorAll('.gsc-webResult.gsc-result');
      const resultsDiv = document.getElementById('results');
      if (!append) resultsDiv.innerHTML = '';
      setStatus('search-status', false);

      let count = 0;
      rawResults.forEach(r => {
        const a = r.querySelector('.gs-title a');
        if (!a || !a.href) return;
        const vid = getVideoIdFromUrl(a.href);
        if (!vid) return;
        const title = (a.textContent || '').trim();
        let channel = '';
        const urlEl = r.querySelector('.gs-visibleUrl');
        if (urlEl) channel = urlEl.textContent.replace(/https?:\/\/(www\.)?youtube\.com\/.*/i, '').trim();
        const snipEl = r.querySelector('.gs-snippet');
        if (!channel && snipEl) {
          const m = snipEl.textContent.match(/by ([^•–-]+)/i);
          if (m) channel = m[1].trim();
        }
        if (document.querySelector(`.video-card[data-vid="${vid}"]`)) return;

        const card = document.createElement('div');
        card.className = 'video-card';
        card.dataset.vid = vid;
        card.innerHTML = `
          <div class="thumb-wrapper">
            <img class="thumb" src="${youTubeThumb(vid)}" alt="Thumbnail" loading="lazy">
          </div>
          <div class="info">
            <div class="title">${escapeHTML(title)}</div>
            <div class="channel">${escapeHTML(channel || 'YouTube')}</div>
          </div>
        `;
        card.addEventListener('click', () => navigateTo(`#/watch?v=${encodeURIComponent(vid)}`));
        resultsDiv.appendChild(card);
        count++;
      });

      if (!append && count === 0) {
        resultsDiv.innerHTML = '<div class="muted">動画が見つかりませんでした。</div>';
      }
    }

    // ページネーションの設定
    function setupPaginationState() {
      const container = document.getElementById('hidden-cse');
      if (!container) return;
      const cursorPages = container.querySelectorAll('.gsc-cursor-page');
      if (cursorPages && cursorPages.length > 0) {
        pagination.hasCursor = true;
        pagination.totalPages = cursorPages.length;
        cursorPages.forEach((p, i) => {
          if (p.getAttribute('aria-current') === 'page' || p.classList.contains('gsc-cursor-current-page')) {
            pagination.currentIndex = i;
          }
        });
        document.getElementById('next-page-btn').disabled = (pagination.currentIndex >= pagination.totalPages - 1);
      } else {
        pagination.hasCursor = false;
        document.getElementById('next-page-btn').disabled = true;
      }
    }

    // 次のページへ
    function gotoNextPage() {
      if (pagination.loadingNext) return;
      pagination.loadingNext = true;
      const nextBtn = document.getElementById('next-page-btn');
      if (pagination.hasCursor) {
        const container = document.getElementById('hidden-cse');
        const cursorPages = container.querySelectorAll('.gsc-cursor-page');
        const nextIndex = pagination.currentIndex + 1;
        if (!cursorPages[nextIndex]) {
          pagination.loadingNext = false; nextBtn.disabled = true; return;
        }
        cursorPages[nextIndex].dispatchEvent(new MouseEvent('click', { bubbles: true }));
        waitForNextPageResults(nextIndex, 0);
      } else {
        pagination.loadingNext = false; nextBtn.disabled = true;
      }
    }

    function waitForNextPageResults(expectedIndex, attempts) {
      if (attempts > 50) { pagination.loadingNext = false; return; }
      const container = document.getElementById('hidden-cse');
      const cursorPages = container.querySelectorAll('.gsc-cursor-page');
      let activeIndex = -1;
      if (cursorPages) {
        cursorPages.forEach((p, i) => {
          if (p.getAttribute('aria-current') === 'page' || p.classList.contains('gsc-cursor-current-page')) activeIndex = i;
        });
      }

      if (activeIndex === expectedIndex) {
        setTimeout(() => {
          renderSearchResultsFromCSE(true);
          setupPaginationState();
          pagination.loadingNext = false;
        }, 100);
      } else {
        setTimeout(() => waitForNextPageResults(expectedIndex, attempts + 1), 200);
      }
    }

    // iframeを用いた動画の読み込み
    async function loadWatch(videoId) {
      window.scrollTo({ top: 0, behavior: 'instant' });

      const player = document.getElementById('player');
      if (player) {
        player.pause();
        player.removeAttribute('src');
        player.load();
        player.style.display = 'none';
      }

      document.getElementById('video-title').textContent = '読み込み中...';
      document.getElementById('video-duration').style.display = 'none';
      document.getElementById('video-source').style.display = 'none';
      document.getElementById('video-status').style.display = 'none';

      // 1. noembed API からタイトルと投稿者情報を取得
      try {
        const noembedRes = await fetch(`https://noembed.com/embed?url=https://youtube.com/watch?v=${videoId}`);
        const noembedData = await noembedRes.json();
        
        document.getElementById('video-title').textContent = noembedData.title || '動画';
        
        if (noembedData.author_name) {
          const vsrc = document.getElementById('video-source');
          vsrc.textContent = noembedData.author_name;
          vsrc.style.display = 'inline';
        }
      } catch (e) {
        document.getElementById('video-title').textContent = '動画';
      }

      // 2. example.com から result を取得
      let result = '';
      try {
        const resultRes = await fetch('https://example.com');
        result = await resultRes.text(); 
      } catch (e) {
        console.warn('example.comからの取得に失敗しました', e);
      }

      // 3. iframe を作成して YouTube Education を埋め込む
      let iframe = document.getElementById('youtube-embed-iframe');
      if (!iframe) {
        iframe = document.createElement('iframe');
        iframe.id = 'youtube-embed-iframe';
        iframe.setAttribute('allowfullscreen', 'true');
        iframe.setAttribute('frameborder', '0');
        iframe.style.width = '100%';
        iframe.style.aspectRatio = '16 / 9';
        iframe.style.backgroundColor = '#000';
        
        if (player && player.parentNode) {
          player.parentNode.insertBefore(iframe, player.nextSibling);
        }
      }
      
      iframe.style.display = 'block';
      iframe.src = `https://www.youtubeeducation.com/embed/${encodeURIComponent(videoId)}${result}`;

      loadComments(videoId);

      const title = document.getElementById('video-title').textContent || '';
      const authorFragment = title.split(' - ')[0].split('|')[0].trim();
      const query = `${authorFragment} ${title.split(' ').slice(0, 3).join(' ')}`.trim();
      loadRecommendations(query, videoId);
    }

    // 関連動画の取得
    function loadRecommendations(query, currentVideoId) {
      const status = document.getElementById('recs-status');
      const list = document.getElementById('recs-list');
      status.classList.add('show');
      list.innerHTML = '';
      try {
        const elem = cseHiddenElem || (window.google && google.search && google.search.cse && google.search.cse.element && (google.search.cse.element.getElement('hidden-cse') || google.search.cse.element.getElement('searchresults-only0')));
        if (!elem) { setTimeout(() => loadRecommendations(query, currentVideoId), 200); return; }

        const container = document.getElementById('hidden-cse');
        if (container) {
          const resContainer = container.querySelector('.gsc-results');
          if (resContainer) resContainer.innerHTML = '';
        }

        elem.execute(`site:youtube.com ${query}`);

        const checkRecs = (attempts) => {
          if (attempts > 50) {
            status.classList.remove('show');
            list.innerHTML = '<div class="muted">関連動画の取得にタイムアウトしました。</div>';
            return;
          }
          const raw = container.querySelectorAll('.gsc-webResult.gsc-result');
          const noResultsText = container.innerText || "";
          if (raw && raw.length > 0) {
            const items = [];
            raw.forEach(r => {
              const a = r.querySelector('.gs-title a'); if (!a || !a.href) return;
              const vid = getVideoIdFromUrl(a.href); if (!vid || vid === currentVideoId) return;
              const title = (a.textContent || '').trim();
              let channel = ''; const urlEl = r.querySelector('.gs-visibleUrl');
              if (urlEl) channel = urlEl.textContent.replace(/https?:\/\/(www\.)?youtube\.com\/.*/i, '').trim();
              const snipEl = r.querySelector('.gs-snippet');
              if (!channel && snipEl) { const m = snipEl.textContent.match(/by ([^•–-]+)/i); if (m) channel = m[1].trim(); }
              items.push({ vid, title, channel });
            });
            const dedup = []; const seen = new Set();
            for (const it of items) { if (seen.has(it.vid)) continue; seen.add(it.vid); dedup.push(it); if (dedup.length >= 10) break; }
            status.classList.remove('show');
            dedup.forEach(it => {
              const el = document.createElement('div'); el.className = 'rec-card';
              el.innerHTML = `
                <img class="rec-thumb" src="${youTubeThumb(it.vid)}" alt="Thumbnail">
                <div>
                  <div class="rec-title">${escapeHTML(it.title)}</div>
                  <div class="rec-channel">${escapeHTML(it.channel || 'YouTube')}</div>
                </div>
              `;
              el.addEventListener('click', () => navigateTo(`#/watch?v=${encodeURIComponent(it.vid)}`));
              list.appendChild(el);
            });
            if (!dedup.length) { status.classList.remove('show'); list.innerHTML = '<div class="muted">関連動画が見つかりませんでした。</div>'; }
          } else if (noResultsText.includes('一致する') || noResultsText.includes('見つかりません') || noResultsText.includes('No results')) {
            status.classList.remove('show'); list.innerHTML = '<div class="muted">関連動画が見つかりませんでした。</div>';
          } else {
            setTimeout(() => checkRecs(attempts + 1), 200);
          }
        };
        checkRecs(0);
      } catch (e) {
        status.classList.remove('show');
        list.innerHTML = '<div class="muted">関連動画の取得に失敗しました。</div>';
      }
    }

    // コメント取得（ダミー）
    async function loadComments(videoId) {
      document.getElementById('comments-status').classList.add('show');
      document.getElementById('comments-list').innerHTML = '';
      setTimeout(() => {
        const dummyComments = [
          { author: 'User A', text: 'とても参考になりました！' },
          { author: 'User B', text: '素晴らしい動画ですね。' },
          { author: 'User C', text: '次回の更新も楽しみにしています。' }
        ];
        renderComments(dummyComments);
      }, 1000);
    }
    function renderComments(comments) {
      document.getElementById('comments-status').classList.remove('show');
      const list = document.getElementById('comments-list');
      list.innerHTML = '';
      if (!comments || comments.length === 0) {
        list.innerHTML = '<div class="muted">コメントはありません。</div>';
        return;
      }
      comments.forEach(c => {
        const el = document.createElement('div');
        el.className = 'comment';
        el.innerHTML = `
          <div class="comment-author">${escapeHTML(c.author)}</div>
          <div class="comment-text">${escapeHTML(c.text)}</div>
        `;
        list.appendChild(el);
      });
    }

    // 初期化とイベントリスナーの設定
    document.addEventListener('DOMContentLoaded', () => {
      initCSE();
      handleRoute();

      // 検索ボタンと入力欄のイベント
      const searchBtn = document.getElementById('nav-search-btn');
      const searchInput = document.getElementById('nav-search-input');
      
      if (searchBtn && searchInput) {
        searchBtn.addEventListener('click', () => {
          const q = searchInput.value.trim();
          if (q) navigateTo(`#/results?q=${encodeURIComponent(q)}`);
        });

        searchInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            const q = searchInput.value.trim();
            if (q) navigateTo(`#/results?q=${encodeURIComponent(q)}`);
          }
        });
      }

      // 「さらに読み込む」ボタンのイベント
      const nextBtn = document.getElementById('next-page-btn');
      if (nextBtn) {
        nextBtn.addEventListener('click', gotoNextPage);
      }
    });

    window.addEventListener('hashchange', handleRoute);
  </script>
